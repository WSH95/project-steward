name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.8", "3.10", "3.12", "3.13"]
        include:
          # Python 3.7 floor: only runners that still provide 3.7 builds.
          # macOS is untestable at 3.7 since GitHub retired the last x64
          # image (macos-13); arm64 images ship no CPython 3.7 builds.
          - os: ubuntu-22.04
            python: "3.7"
          - os: windows-latest
            python: "3.7"
        exclude:
          # macos-latest (arm64) has no CPython 3.8 build.
          - os: macos-latest
            python: "3.8"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          project-steward --version
          project-steward survey --json
          projectforge --version
      - name: Hook JSON validation
        run: python -m json.tool plugin/hooks/hooks.json && python -m json.tool plugin/hooks/codex.hooks.json
        shell: bash
      - name: Self doctor
        run: project-steward doctor --self
